<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Clothing Store</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
    <nav class="navbar">
        <h1 class="logo">FashionShop</h1>
        <ul class="menu">
        <li><a href="#men">Men</a></li>
        <li><a href="#women">Women</a></li>
        <li><a href="#kids">Kids</a></li>
    </ul>
    </nav>
    <form> 
        <input type="text" name=text class="search" placeholder Search here!>
        <input type="submit" name="submit" class="submit" value="Search">
    </form>
</header>

<main>
    <section class="banner">
        <h2>Welcome to the Trendiest Store</h2>
        <p>Discover the latest styles at unbeatable prices!</p>
        <button onclick="shopNow()">Shop Now</button>
    </section>

    <section class="products">
        <div class="product_card">
            <img src="images/1.jpg" alt="Elegant Dress">
            <h3>Elegant Dress</h3>
            <p>$49.99</p>
            <button>Add to Cart</button>
        </div>
        <div class="product_card">
        <img src="images/2.jpg" alt="Stylish Jacket">
        <h3>Stylish Jacket</h3>
        <p>$79.99</p>
        <button>Add to Cart</button>
    </div>
    <div class="product_card">
        <img src="images/3.jpg" alt="Casual Shirt">
        <h3>Casual Shirt</h3>
        <p>$29.99</p>
        <button>Add to Cart</button>
    </div>
    </section>
</main>

<footer>
    <p>&copy; 2024 FashionShop. All Rights Reserved.</p>
</footer>

<script src="script.js"></script>
</body>
</html>
